site_name: SexLab Survival
site_description: Skyrim SE survival/gameplay overhaul — needs, licences, tolls, misogyny and dozens of optional LoversLab mod integrations, all behind a resilient adapter layer.
site_url: https://crajjjj.github.io/SLSurvival/
repo_name: crajjjj/SLSurvival
repo_url: https://github.com/crajjjj/SLSurvival
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started: players/getting-started.md
  - Needs & Survival: players/needs.md
  - Licences: players/licences.md
  - Tolls, Eviction & Gates: players/tolls-eviction-gates.md
  - Misogyny & Inequality: players/misogyny.md
  - Sex, Trauma & Effects: players/sex-and-effects.md
  - Cum & Bukkake: players/cum.md
  - Bikini Armors & EXP: players/bikini-armors.md
  - Begging & Kennel: players/begging-kennel.md
  - Stashes, Pickpocket & Dismemberment: players/stashes-pickpocket.md
  - Mod Integrations: players/integrations.md
  - MCM Reference: players/mcm-reference.md
  - Internals: internals.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

validation:
  links:
    not_found: warn
    anchors: warn

plugins:
  - search
